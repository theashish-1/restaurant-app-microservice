# ===================================================================
# APPLICATION CONFIGURATION
# ===================================================================
spring.application.name=restaurent-service
server.port=9091

# ===================================================================
# POSTGRESQL DATABASE CONNECTION SETTINGS
# ===================================================================
# Note: Database credentials use environment variables with local defaults.
# Format: ${ENVIRONMENT_VARIABLE_NAME:default_fallback_value}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurantdb?serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:user123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATIONS
# ===================================================================
# Automatically updates the database schema based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Logging configurations for development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate SQL Dialect for PostgreSQL 10+
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect